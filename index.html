<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador Profissional DigiArt Ar v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .app-container { max-width: 900px; margin: 0 auto; background: #ecf0f1; color: #2c3e50; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #c0392b; margin-top: 0; }
        .controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; background: #ddd; padding: 15px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        input { padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; }
        #info { background: #34495e; color: white; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px; font-weight: bold; }
        #preview-container { width: 100%; height: 450px; background: white; border: 2px solid #bdc3c7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        button { width: 100%; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #a93226; transform: scale(1.01); }
    </style>
</head>
<body>

<div class="app-container">
    <h1>DigiArt Ar - Gerador de Quebra-Cabeça</h1>
    
    <div class="controls">
        <div class="input-group"><label>Largura (mm)</label><input type="number" id="width" value="250" oninput="update()"></div>
        <div class="input-group"><label>Altura (mm)</label><input type="number" id="height" value="190" oninput="update()"></div>
        <div class="input-group"><label>Colunas</label><input type="number" id="cols" value="10" oninput="update()"></div>
        <div class="input-group"><label>Linhas</label><input type="number" id="rows" value="8" oninput="update()"></div>
    </div>

    <div id="info">Peças: 80 | Carregando...</div>

    <div id="preview-container"></div>

    <button onclick="downloadSVG()">Gerar e Baixar SVG para Laser</button>
</div>

<script>
    function update() {
        const w = parseFloat(document.getElementById('width').value) || 100;
        const h = parseFloat(document.getElementById('height').value) || 100;
        const cols = parseInt(document.getElementById('cols').value) || 1;
        const rows = parseInt(document.getElementById('rows').value) || 1;
        
        document.getElementById('info').innerHTML = `Total: ${cols * rows} peças | Tamanho da Peça: ${(w/cols).toFixed(1)} x ${(h/rows).toFixed(1)} mm`;
        generatePuzzle(w, h, cols, rows);
    }

    function generatePuzzle(w, h, cols, rows) {
        const container = document.getElementById('preview-container');
        const cellW = w / cols;
        const cellH = h / rows;
        const size = Math.min(cellW, cellH) * 0.25; // Tamanho da maminha

        let svgContent = `<svg id="puzzle-svg" xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">`;
        const style = 'fill="none" stroke="red" stroke-width="0.2"';

        // Linhas Horizontais
        for (let j = 1; j < rows; j++) {
            let y = j * cellH;
            let path = `M 0,${y}`;
            for (let i = 0; i < cols; i++) {
                let xStart = i * cellW;
                let xEnd = (i + 1) * cellW;
                let midX = (xStart + xEnd) / 2;
                let dir = (i + j) % 2 === 0 ? 1 : -1;

                // A "Maminha" com pescoço estreito (Curva de 4 pontos para fazer o círculo)
                path += ` L ${midX - size*0.8},${y}`;
                path += ` C ${midX - size*0.9},${y + size*1.5*dir} ${midX + size*0.9},${y + size*1.5*dir} ${midX + size*0.8},${y}`;
                path += ` L ${xEnd},${y}`;
            }
            svgContent += `<path d="${path}" ${style} />`;
        }

        // Linhas Verticais
        for (let i = 1; i < cols; i++) {
            let x = i * cellW;
            let path = `M ${x},0`;
            for (let j = 0; j < rows; j++) {
                let yStart = j * cellH;
                let yEnd = (j + 1) * cellH;
                let midY = (yStart + yEnd) / 2;
                let dir = (i + j) % 2 === 0 ? 1 : -1;

                path += ` L ${x},${midY - size*0.8}`;
                path += ` C ${x + size*1.5*dir},${midY - size*0.9} ${x + size*1.5*dir},${midY + size*0.9} ${x},${midY + size*0.8}`;
                path += ` L ${x},${yEnd}`;
            }
            svgContent += `<path d="${path}" ${style} />`;
        }

        // Borda Externa Reta
        svgContent += `<rect x="0" y="0" width="${w}" height="${h}" ${style} />`;
        svgContent += `</svg>`;
        
        container.innerHTML = svgContent;
    }
