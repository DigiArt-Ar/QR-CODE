<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Profissional DigiArt Ar</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app { background: #222; width: 100%; max-width: 400px; padding: 15px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff4d4d; text-align: center; margin: 0 0 10px 0; font-size: 22px; }
        #preview { width: 100%; height: 250px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        svg { width: 95%; height: 95%; }
        .inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .box { display: flex; flex-direction: column; }
        label { font-size: 11px; color: #999; margin-bottom: 3px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: #0f0; font-weight: bold; font-size: 16px; }
        #stats { background: #333; padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; margin-bottom: 15px; border-left: 5px solid #ff4d4d; }
        button { width: 100%; padding: 16px; background: #ff4d4d; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #cc0000; }
    </style>
</head>
<body>

<div class="app">
    <h2>DigiArt Ar</h2>
    <div id="preview"></div>
    <div id="stats">Aguardando...</div>
    <div class="inputs">
