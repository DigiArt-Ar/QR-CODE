<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiArt AR - Gerador de Vetores</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #f4f4f9; color: #333; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #1e3a8a; margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #1d4ed8; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gerador de Corte S9</h2>
    
    <div class="input-group">
        <label>Largura Total (mm):</label>
        <input type="number" id="width" value="297">
    </div>
    
    <div class="input-group">
        <label>Altura Total (mm):</label>
        <input type="number" id="height" value="210">
    </div>
    
    <div class="input-group">
        <label>Colunas (Horizontal):</label>
        <input type="number" id="cols" value="6">
    </div>
    
    <div class="input-group">
        <label>Linhas (Vertical):</label>
        <input type="number" id="rows" value="4">
    </div>

    <button onclick="downloadPuzzleSVG()">BAIXAR ARQUIVO SVG</button>
    
    <div class="footer">DigiArt AR - Sistema Interno de Produção</div>
</div>

<script>
function downloadPuzzleSVG() {
    const w = parseFloat(document.getElementById('width').value);
    const h = parseFloat(document.getElementById('height').value);
    const cols = parseInt(document.getElementById('cols').value);
    const rows = parseInt(document.getElementById('rows').value);
    
    const pw = w / cols;
    const ph = h / rows;
    const ts = Math.min(pw, ph) * 0.25; // Tamanho do encaixe (mamilo)

    let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">`;
    
    // Estilo de corte: Vermelho, linha fina
    const style = 'fill="none" stroke="red" stroke-width="0.1"';

    // Borda externa
    svg += `<rect x="0" y="0" width="${w}" height="${h}" ${style} />`;

    // Função para criar a curva do encaixe (mamilo)
    const drawTab = (x1, y1, x2, y2, horizontal) => {
        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2;
        if (horizontal) {
            return `L ${mx-ts},${y1} C ${mx-ts},${y1-ts} ${mx+ts},${y1-ts} ${mx+ts},${y1} L ${x2},${y2}`;
        } else {
            return `L ${x1},${my-ts} C ${x1+ts},${my-ts} ${x1+ts},${my+ts} ${x1},${my+ts} L ${x2},${y2}`;
        }
    };

    // Cortes Verticais
    for (let i = 1; i < cols; i++) {
        let x = i * pw;
        let path = `M ${x},0 `;
        for (let j = 0; j < rows; j++) {
            path += drawTab(x, j*ph, x, (j+1)*ph, false);
        }
        svg += `<path d="${path}" ${style} />`;
    }

    // Cortes Horizontais
    for (let j = 1; j < rows; j++) {
        let y = j * ph;
        let path = `M 0,${y} `;
        for (let i = 0; i < cols; i++) {
            path += drawTab(i*pw, y, (i+1)*pw, y, true);
        }
        svg += `<path d="${path}" ${style} />`;
    }

    svg += '</svg>';

    // Download do arquivo
    const blob = new Blob([svg], {type: 'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `corte_digiart_${cols}x${rows}_${w}mm.svg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
