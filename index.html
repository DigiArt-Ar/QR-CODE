<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador DigiArt Ar - Quebra-Cabeça Profissional</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #e44d26; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .info-box { background: #eef7ff; padding: 15px; border-radius: 8px; border-left: 5px solid #2196f3; margin-bottom: 20px; }
        #preview-container { width: 100%; height: 400px; border: 2px dashed #bbb; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #fafafa; position: relative; }
        svg { max-width: 100%; max-height: 100%; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; }
        .footer-brand { text-align: center; margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>DigiArt Ar</h1>
    <p class="subtitle">Gerador de Gabaritos para Corte a Laser</p>

    <div class="controls">
        <div class="input-group">
            <label>Largura Total (mm)</label>
            <input type="number" id="width" value="250" oninput="update()">
        </div>
        <div class="input-group">
            <label>Altura Total (mm)</label>
            <input type="number" id="height" value="190" oninput="update()">
        </div>
        <div class="input-group">
            <label>Colunas</label>
            <input type="number" id="cols" value="5" oninput="update()">
        </div>
        <div class="input-group">
            <label>Linhas</label>
            <input type="number" id="rows" value="4" oninput="update()">
        </div>
    </div>

    <div class="info-box" id="info">
        Total de Peças: 20 | Tamanho médio: 50x47.5mm
    </div>

    <div id="preview-container">
        </div>

    <br>
    <button onclick="downloadSVG()">Baixar Arquivo SVG para Laser</button>
    
    <div class="footer-brand">DigiArt Ar - Personalizados</div>
</div>

<script>
    function update() {
        const w = parseFloat(document.getElementById('width').value) || 0;
        const h = parseFloat(document.getElementById('height').value) || 0;
        const cols = parseInt(document.getElementById('cols').value) || 1;
        const rows = parseInt(document.getElementById('rows').value) || 1;
        
        const total = cols * rows;
        document.getElementById('info').innerHTML = `Total de Peças: <strong>${total}</strong> | Tamanho médio: ${(w/cols).toFixed(1)}x${(h/rows).toFixed(1)}mm`;

        generateSVG(w, h, cols, rows);
    }

    function generateSVG(w, h, cols, rows) {
        const container = document.getElementById('preview-container');
        const cellW = w / cols;
        const cellH = h / rows;
        const tabSize = Math.min(cellW, cellH) * 0.3; // Maminha proporcional à peça

        let paths = "";
        const strokeStyle = 'fill="none" stroke="red" stroke-width="0.2"';

        // 1. Linhas Horizontais Contínuas (Maminhas aleatórias para cima/baixo)
        for (let j = 1; j < rows; j++) {
            let y = j * cellH;
            let d = `M 0,${y}`;
            for (let i = 0; i < cols; i++) {
                let xStart = i * cellW;
                let xEnd = (i + 1) * cellW;
                let midX = (xStart + xEnd) / 2;
                let dir = Math.random() > 0.5 ? 1 : -1; // Inverte direção aleatoriamente
                
                d += ` L ${midX - tabSize/1.2},${y}`;
                d += ` C ${midX - tabSize/1.2},${y + tabSize*dir} ${midX + tabSize/1.2},${y + tabSize*dir} ${midX + tabSize/1.2},${y}`;
                d += ` L ${xEnd},${y}`;
            }
            paths += `<path d="${d}" ${strokeStyle} />\n`;
        }

        // 2. Linhas Verticais Contínuas (Maminhas aleatórias para esquerda/direita)
        for (let i = 1; i < cols; i++) {
            let x = i * cellW;
            let d = `M ${x},0`;
            for (let j = 0; j < rows; j++) {
                let yStart = j * cellH;
                let yEnd = (j + 1) * cellH;
                let midY = (yStart + yEnd) / 2;
                let dir = Math.random() > 0.5 ? 1 : -1;

                d += ` L ${x},${midY - tabSize/1.2}`;
                d += ` C ${x + tabSize*dir},${midY - tabSize/1.2} ${x + tabSize*dir},${midY + tabSize/1.2} ${x},${midY + tabSize/1.2}`;
                d += ` L ${x},${yEnd}`;
            }
            paths += `<path d="${d}" ${strokeStyle} />\n`;
        }

        // 3. Moldura Externa (Corte final)
        const frame = `<rect x="0" y="0" width="${w}" height="${h}" ${strokeStyle} />`;

        const svgHeader = `<svg id="puzzle-svg" xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">`;
        container.innerHTML = svgHeader + paths + frame + "</svg>";
    }

    function downloadSVG() {
        const svgData = document.getElementById('puzzle-svg').outerHTML;
        const blob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `DigiArt_AR_Puzzle_${Date.now()}.svg`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Inicializar
    update();
</script>

</body>
</html>
