<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Orçamento - DigiArt</title>
    <style>
        :root {
            --azul-porteiro: #007bff;
            --dark-bg: #1e1e1e;
            --card-bg: #2d2d2d;
            --texto: #ffffff;
        }
        body { font-family: sans-serif; background: var(--dark-bg); color: var(--texto); display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border-left: 5px solid var(--azul-porteiro); }
        h2 { text-align: center; margin-bottom: 20px; color: var(--azul-porteiro); letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #bbb; }
        input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #121212; color: #fff; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--azul-porteiro); border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #0056b3; transform: scale(1.02); }
        .resultado { margin-top: 25px; padding: 15px; background: #121212; border-radius: 8px; border: 1px dashed var(--azul-porteiro); }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.1em; }
        .total { font-size: 1.4em; font-weight: bold; border-top: 1px solid #444; padding-top: 10px; margin-top: 10px; color: #00ff88; }
    </style>
</head>
<body>

<div class="card">
    <h2>DASHBOARD DIGIART</h2>
    
    <div class="input-group">
        <label>Valor do Meu Serviço (Design/Vetor) R$</label>
        <input type="number" id="valorServico" placeholder="Ex: 85" step="0.01">
    </div>

    <div class="input-group">
        <label>Tempo de Máquina (Minutos no LightBurn)</label>
        <input type="number" id="tempoMaquina" placeholder="Ex: 45">
    </div>

    <div class="input-group">
        <label>Custo de Material (MDF/Vinil) R$</label>
        <input type="number" id="valorMaterial" placeholder="Ex: 10" step="0.01">
    </div>

    <button onclick="calcularOrcamento()">CALCULAR PREÇO FINAL</button>

    <div id="displayResultado" class="resultado" style="display: none;">
        <div class="res-item"><span>Serviço:</span> <span id="outServico">R$ 0,00</span></div>
        <div class="res-item"><span>Máquina (S9):</span> <span id="outMaquina">R$ 0,00</span></div>
        <div class="res-item"><span>Material:</span> <span id="outMaterial">R$ 0,00</span></div>
        <div class="res-item total"><span>TOTAL:</span> <span id="outTotal">R$ 0,00</span></div>
    </div>
</div>

<script>
    function calcularOrcamento() {
        // Pega os valores dos inputs
        const servico = parseFloat(document.getElementById('valorServico').value) || 0;
        const tempo = parseFloat(document.getElementById('tempoMaquina').value) || 0;
        const material = parseFloat(document.getElementById('valorMaterial').value) || 0;
        
        // Regra de R$ 2,00 por minuto da S9
        const custoMaquina = tempo * 2.00;
        const total = servico + custoMaquina + material;

        // Formatação para Real (BRL)
        const formatar = (v) => v.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});

        // Exibe os resultados
        document.getElementById('outServico').innerText = formatar(servico);
        document.getElementById('outMaquina').innerText = formatar(custoMaquina);
        document.getElementById('outMaterial').innerText = formatar(material);
        document.getElementById('outTotal').innerText = formatar(total);
        
        // Mostra a div de resultado
        document.getElementById('displayResultado').style.display = 'block';
    }
</script>

</body>
</html>
