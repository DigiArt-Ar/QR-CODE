<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiArt Ar - Laser Puzzle</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #2d2d2d; width: 100%; max-width: 400px; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { font-size: 18px; text-align: center; margin: 0 0 10px 0; color: #ff4d4d; }
        
        /* Inputs compactos lado a lado */
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; color: #aaa; margin-bottom: 2px; }
        input { padding: 6px; border-radius: 4px; border: 1px solid #444; background: #111; color: #fff; font-size: 14px; }
        
        #info { background: #444; padding: 8px; border-radius: 5px; text-align: center; font-size: 13px; margin-bottom: 10px; border-left: 4px solid #ff4d4d; }
        
        /* Área de visualização compacta */
        #preview-container { width: 100%; height: 250px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        svg { width: 95%; height: 95%; }

        button { width: 100%; padding: 12px; background: #ff4d4d; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:active { background: #cc0000; }
    </style>
</head>
<body>

<div class="card">
    <h2>DigiArt Ar</h2>
    
    <div class="grid-inputs">
        <div class="input-group"><label>Larg. (mm)</label><input type="number" id="width" value="200" oninput="update()"></div>
        <div class="input-group"><label>Alt. (mm)</label><input type="number" id="height" value="140" oninput="update()"></div>
        <div class="input-group"><label>Colunas</label><input type="number" id="cols" value="3" oninput="update()"></div>
        <div class="input-group"><label>Linhas</label><input type="number" id="rows" value="2" oninput="update()"></div>
    </div>

    <div id="info">Peças: 6</div>

    <div id="preview-container"></div>

    <button onclick="downloadSVG()">BAIXAR SVG</button>
</div>

<script>
    function update() {
        const w = parseFloat(document.getElementById('width').value) || 100;
        const h = parseFloat(document.getElementById('height').value) || 100;
        const c = parseInt(document.getElementById('cols').value) || 1;
        const r = parseInt(document.getElementById('rows').value) || 1;
        
        document.getElementById('info').innerHTML = `<b>Total: ${c * r} peças</b> | ${(w/c).toFixed(1)}x${(h/r).toFixed(1)}mm`;
        draw(w, h, c, r);
    }

    function draw(w, h, cols, rows) {
        const cellW = w / cols;
        const cellH = h / rows;
        const tab = Math.min(cellW, cellH) * 0.28; // Maminha proporcional

        let paths = "";
        const style = 'fill="none" stroke="red" stroke-width="0.3"';

        // Linhas Horizontais Contínuas
        for (let j = 1; j < rows; j++) {
            let y = j * cellH;
            let d = `M 0,${y}`;
            for (let i = 0; i < cols; i++) {
                let x1 = i * cellW, x2 = (i + 1) * cellW, mx = (x1 + x2) / 2;
                let dir = (i + j) % 2 === 0 ? 1 : -1;
                d += ` L ${mx - tab*0.8},${y} C ${mx - tab},${y + tab*1.4*dir} ${mx + tab},${y + tab*1.4*dir} ${mx + tab*0.8},${y} L ${x2},${y}`;
            }
            paths += `<path d="${d}" ${style} />`;
        }

        // Linhas Verticais Contínuas
        for (let i = 1; i < cols; i++) {
            let x = i * cellW;
            let d = `M ${x},0`;
            for (let j = 0; j < rows; j++) {
                let y1 = j * cellH, y2 = (j + 1) * cellH, my = (y1 + y2) / 2;
                let dir = (i + j) % 2 === 0 ? 1 : -1;
                d += ` L ${x},${my - tab*0.8} C ${x + tab*1.4*dir},${my - tab} ${x + tab*1.4*dir},${my + tab} ${x},${my + tab*0.8} L ${x},${y2}`;
            }
            paths += `<path d="${d}" ${style} />`;
        }

        const rect = `<rect x="0" y="0" width="${w}" height="${h}" ${style} />`;
        document.getElementById('preview-container').innerHTML = `<svg id="svg" viewBox="0 0 ${w} ${h}">${paths}${rect}</svg>`;
    }

    function downloadSVG() {
        const svg = document.getElementById('svg').outerHTML;
        const blob = new Blob([svg], {type: 'image/svg+xml'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "puzzle_digiart.svg";
        link.click();
    }

    update();
</script>
</body>
</html>
