<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiArt Ar - Puzzle V4</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app { background: #2d2d2d; width: 100%; max-width: 400px; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ff4d4d; margin: 0 0 10px 0; }
        #preview { width: 100%; height: 260px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 10px; }
        svg { width: 95%; height: 95%; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        label { font-size: 11px; color: #bbb; margin-bottom: 2px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #000; color: #0f0; font-size: 16px; font-weight: bold; }
        #info { background: #444; padding: 10px; border-radius: 6px; text-align: center; font-size: 14px; margin-bottom: 15px; border-left: 5px solid #ff4d4d; }
        button { width: 100%; padding: 16px; background: #ff4d4d; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <h2>DigiArt Ar</h2>
    <div id="preview"></div>
    <div id="info">Calculando...</div>
    <div class="grid-inputs">
        <div style="display:flex; flex-direction:column;"><label>Largura (mm)</label><input type="number" id="w" value="200" oninput="up()"></div>
        <div style="display:flex; flex-direction:column;"><label>Altura (mm)</label><input type="number" id="h" value="140" oninput="up()"></div>
